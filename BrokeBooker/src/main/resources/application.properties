spring.application.name=BrokeBooker

# ---------- Database (NeonDB Postgres) ----------
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://ep-little-morning-a7tdr8zz-pooler.ap-southeast-2.aws.neon.tech/neondb?sslmode=require}
spring.datasource.username=${DATABASE_USERNAME:neondb_owner}
spring.datasource.password=${DATABASE_PASSWORD:npg_EyGq63iPtfeO}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---------- JPA / Hibernate ----------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ---------- Flyway ----------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ---------- JWT ----------
app.jwt.secret=${JWT_SECRET:change-me-super-long-secret-please-override-in-env-at-least-64-bytes-long-1234567890}
app.jwt.expiration-ms=86400000

# ---------- CORS ----------
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ---------- Geocoding (OpenCage) ----------
app.geocoding.api-key=${GEOCODING_API_KEY:69e3431552cdc144419593bjf69f66f}
app.geocoding.base-url=https://geocode.maps.co/search
# ISO 3166-1 alpha-2 country codes to bias the geocoder toward (comma-separated, lower-case).
# We're an India-first product; restricting stops "Whitefield" landing on Whitefield, USA.
app.geocoding.country-codes=${GEOCODING_COUNTRY_CODES:in}

# ---------- Server ----------
server.port=${PORT:8080}
server.error.include-message=always

# ---------- Logging ----------
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO
